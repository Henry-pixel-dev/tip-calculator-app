<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="stylesheet" href="src/output.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Tip calculator app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body class="bg-Grey-200 flex flex-col items-center justify-center min-h-screen font-['Space_Mono']">
  <header>
    <img src="images/logo.svg" alt="">
  </header>

  <main class="bg-white w-full max-w-[920px] mt-10 rounded-lg p-8">
    <form action="*/action" class="flex flex-col space-y-6 md:flex-row md:space-x-6 md:space-y-0 md:justify-between">
      <div class="flex-1 flex flex-col space-y-6">
        <div class="space-y-2">
          <label for="BillNumber" class="block text-base font-bold text-Grey-500">
            Bill
          </label>
          <div class="relative">
            <input type="number" min="1" id="BillNumber" class="relative bg-Grey-100 text-right text-3xl font-bold text-Green-900 mt-1 block w-full rounded-md border-gray-300 shadow-sm hover:outline-Green-400  focus:outline-Green-400 cursor-pointer p-2 pl-10 " placeholder="0">
            <img src="images/icon-dollar.svg" alt="dollar Icon" class="absolute top-4 left-3 w-4 h-5">
          </div>
        </div>
        <div class="space-y-2">
          <label class="block text-base font-bold text-gray-700">
            Select Tip %
          </label>
          <div class="grid grid-cols-2 gap-4 mt-1">
            <button data-type="Number" data-value="5" type="button" class="bg-Green-900 text-white text-2xl font-bold rounded-md p-2 cursor-pointer hover:bg-Green-400 hover:text-Green-900 active:bg-Green-900 tip-button">5%</button>
            <button data-type="Number" data-value="10" type="button" class="bg-Green-900 text-white text-2xl font-bold rounded-md p-2 cursor-pointer hover:bg-Green-400 hover:text-Green-900 tip-button">10%</button>
            <button data-type="Number" data-value="15" type="button" class="bg-Green-900 text-white text-2xl font-bold rounded-md p-2 cursor-pointer hover:bg-Green-400 hover:text-Green-900 tip-button">15%</button>
            <button data-type="Number" data-value="25" type="button" class="bg-Green-900 text-white text-2xl font-bold rounded-md p-2 cursor-pointer hover:bg-Green-400 hover:text-Green-900 tip-button">25%</button>
            <button data-type="Number" data-value="50" type="button" class="bg-Green-900 text-white text-2xl font-bold rounded-md p-2 cursor-pointer hover:bg-Green-400 hover:text-Green-900 tip-button">50%</button>
            <input type="number" min="1"  id="custom-tip" class="bg-Grey-100 text-right text-3xl font-bold text-Green-900 block w-full rounded-md border-gray-300 shadow-sm  hover:outline-Green-400  focus:outline-Green-400 " placeholder="Custom">
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex flex-row justify-between w-full">
            <label for="people-number" class="block text-base font-bold text-gray-700">
              Number of People
            </label>
            <p id="error-message" class="text-red-500 text-sm font-normal mt-1 hidden">Can't be zero</p>
          </div>
          <div class="relative">
            <input type="number" min="1" step="1" id="people-number" class="bg-Grey-100 text-right text-3xl font-bold text-Green-900 mt-1 block w-full rounded-md border-gray-300 shadow-sm hover:outline-Green-400  focus:outline-Green-400  p-2 pl-10 " placeholder="1">
            <img src="images/icon-person.svg" alt="Person Icon" class="absolute top-4 left-3 w-4 h-5">
          </div>
        </div>
      </div>
      <!-- the display area and the reset button -->
      <div class="flex-1 flex flex-col space-y-6 bg-Green-900 p-6 rounded-md md:justify-between">
        <div class="flex flex-col space-y-6">
          <div class="w-full flex flex-row justify-between">
            <div>
              <p class="text-Grey-50 text-lg font-bold">Tip Amount</p>
              <p class="text-Grey-200 text-sm font-normal mt-1">/ person</p>
            </div>
            <p  class="text-Green-400 text-3xl font-bold mt-1">$<span id="tip-amount">0.00</span></p>
          </div>
          <div class="w-full flex flex-row justify-between">
            <div>
              <p class="text-Grey-50 text-lg font-bold">Total</p>
              <p class="text-Grey-200 text-sm font-normal mt-1">/ person</p>
            </div>
            <p  class="text-Green-400 text-3xl font-bold mt-1">$<span id="total-amount">0.00</span></p>
          </div>
        </div>

        <button id="reset-button" class="bg-Green-400 w-full text-Green-900 text-xl font-bold rounded-md p-2  hover:bg-Grey-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 mb-0" type="button">
          Reset
        </button>
      </div>
    </form>
  </main>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Henry</a>.
  </div>

  <script src="script.js"></script>
</body>
</html>
